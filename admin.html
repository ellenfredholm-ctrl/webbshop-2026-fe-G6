<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Eventera</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_drop_down,delete,edit,keyboard_arrow_left,keyboard_arrow_right" />
  </head>
  <body>

    <header class="site-header">
  <nav>

    <a href="index.html" class="logo">EVENTERA</a>

    <div class="navigation">
      <!-- checkbox -->
      <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-controls="main-menu">

      <!-- burger -->
      <label for="menu-toggle" class="burger" aria-label="navigation">
  <span></span>
  <span></span>
  <span></span>
</label>


      <!-- meny -->
      <ul class="nav-links" id="main-menu">
        <li><a href="events.html">Events</a></li>
        <li><a href="about.html" class="active">About us</a></li>
        <li><a href="register.html">Log in</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>

  </nav>
</header>
    
    
    <main class="admin-main">
      <h1>Admin</h1>
      <div class="admin-main-sections">
        <div class="admin-left-section">

          <div class="create-event">
            <h2>Create Event</h2>
            <form id="createEventForm" class="admin-form">
              <div class="admin-form-row">
                <label for="title">Title</label>
                <input type="text" id="title" required />
              </div>
              <div class="admin-form-row">
                <label for="price">Price</label>
                <input type="number" id="price" step="0.01" min="0" required />
              </div>
              <div class="admin-form-row">
                <label for="total-spots">Total Spots</label>
                <input type="number" id="total-spots" min="0" required />
              </div>
              <div class="admin-form-row">
                <label for="location">Location</label>
                <input type="text" id="location" required />
              </div>
              <div class="admin-form-row">
                <label for="date">Date</label>
                <input type="date" id="date" required />
              </div>
              <div class="admin-form-row">
                <label for="category">Category</label>
                <input type="text" id="category" required />
              </div>
              <div class="admin-form-row">
                <label for="description">Description</label>
                <input type="text" id="description" required />
              </div>
              <div class="admin-form-row">
                <label for="image">Image</label>
                <input type="url" id="image" required />
              </div>
              <button type="submit">Create Event</button>
            </form>
          </div>
        
        <div class="admin-event-list">
            <h2>Events</h2>
            <div class="filter-search">
              <div class="filter-dropdown">
                <div class="filter-dropdown-selected" tabindex="0">Sort by category<span class="material-symbols-outlined">arrow_drop_down</span></div>
                <ul class="filter-dropdown-options">
                  <li class="dropdown-option" data-value="">All categories</li>
                </ul>
              </div>
              <div class="search-tooltip">
                
                <input type="text" id="search-input" placeholder="Search events"/>
                <span class="tooltip-text">Search by title, description or location</span>
              </div>
            </div>
            <div id="admin-event-cards-container" class="admin-event-cards"></div>
          </div>

        </div>

        <div class="admin-right-section">  
          
          <div class="event-calendar-box">
            <h2>Calendar</h2>
            <div class="event-calendar">
                <div class="calendar-header">
                  <button id="previous-month" class="previous-btn"><span class="material-symbols-outlined">keyboard_arrow_left</span></button>
                  <div id="month-year"></div>
                  <button id="next-month" class="next-btn"><span class="material-symbols-outlined">keyboard_arrow_right</span></button>
                </div>
                <div class="weekdays">
                  <div>Mon</div>
                  <div>Tue</div>
                  <div>Wed</div>
                  <div>Thu</div>
                  <div>Fri</div>
                  <div>Sat</div>
                  <div>Sun</div>
                </div>
                <div id="days"></div>
              </div>
          </div>
          
          <div class="recent-events-box">
            <h2>Recent Events</h2>
            <div id="recent-events"></div>
            </div>
          </div>
          
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 EVENTERA. All rights reserved.</p>

          <a href="/about">About</a>

          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
