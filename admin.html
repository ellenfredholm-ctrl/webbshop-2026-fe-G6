<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Eventera</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keyboard_arrow_left,keyboard_arrow_right" />
  </head>
  <body>
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">Eventera</a>
        <ul class="nav-links">
          <li><a href="products.html">Events</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="admin.html">Admin</a></li>
        </ul>
      </nav>
    </header>
    
    <h1>Admin</h1>
    <main class="admin-main">

      <div class="admin-left-section">

        <div class="create-event">
          <h2>Create Event</h2>
          <form id="createEventForm" class="admin-form">
            <div class="admin-form-row">
              <label for="title">Title</label>
              <input type="text" id="title" required />
            </div>
            <div class="admin-form-row">
              <label for="price">Price</label>
              <input type="number" id="price" step="0.01" min="0" required />
            </div>
            <div class="admin-form-row">
              <label for="total-spots">Total Spots</label>
              <input type="number" id="total-spots" min="0" required />
            </div>
            <div class="admin-form-row">
              <label for="location">Location</label>
              <input type="text" id="location" required />
            </div>
            <div class="admin-form-row">
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>
            <div class="admin-form-row">
              <label for="category">Category</label>
              <input type="text" id="category" required />
            </div>
            <div class="admin-form-row">
              <label for="description">Description</label>
              <input type="text" id="description" required />
            </div>
            <div class="admin-form-row">
              <label for="image">Image URL</label>
              <input type="url" id="image" required />
            </div>
            <div class="admin-form-row">
              <label for="slug">Slug</label>
              <input type="text" id="slug" required placeholder="e.g. beyonce-stockholm" />
            </div>
            <button type="submit">Create Event</button>
          </form>
        </div>
      
       <div class="admin-event-list">
          <h2>Events</h2>
          <div id="admin-event-cards-container" class="admin-event-cards"></div>
        </div>

      </div>

      <div class="admin-right-section">  
        
        <div class="event-calendar-box">
          <h2>Calendar</h2>
          <div class="event-calendar">
              <div class="calendar-header">
                <button id="previous-month" class="previous-btn"><span class="material-symbols-outlined">keyboard_arrow_left</span></button>
                <div id="month-year"></div>
                <button id="next-month" class="next-btn"><span class="material-symbols-outlined">keyboard_arrow_right</span></button>
              </div>
              <div class="weekdays">
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
                <div>Sun</div>
              </div>
              <div id="days"></div>
            </div>
        </div>
      
        <div class="recent-events">
          <h2>Recent Events</h2>
        </div>
        
      </div>

    </main>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
