<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Hakim Livs</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="register.css">
  </head>
  <body>

 <header class="site-header">
  <nav>

    <a href="index.html" class="logo">EVENTERA</a>

    <div class="navigation">
      <!-- checkbox -->
      <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-controls="main-menu">

      <!-- burger -->
      <label for="menu-toggle" class="burger" aria-label="navigation">
  <span></span>
  <span></span>
  <span></span>
</label>


      <!-- meny -->
      <ul class="nav-links" id="main-menu">
        <li><a href="events.html">Events</a></li>
        <li><a href="about.html" class="active">About us</a></li>
        <li><a href="register.html">Log in</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>

  </nav>
</header>

    <!-- MAIN CONTENT -->
   <main class="main-content">

    <div class="auth-header">
  <h2 id="loginTitle">Log in</h2>
  <h2 id="registerTitle" style="display: none;">Register</h2>
</div>
  <div id="login-container" class="login-wrapper">
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required />
      </div>

      <button type="submit">Login</button>
    </form>
<div class="auth-row">
  <p>New admin?</p>
  <button id="showRegisterBtn" type="button">Register here</button>
</div>
<p>
  <button id="forgotPasswordBtn" type="button" class="link-btn">
    Forgot password?
  </button>
</p>

<form id="forgotPasswordForm" style="display:none">
  <input type="email" id="forgotEmail" placeholder="Enter your email" required />
  <button type="submit">Send reset link</button>
</form>
  </div>


  <!-- REGISTER (din befintliga) -->

  <div id="register-container" class="register-wrapper" style="display: none;">


    <form id="registerForm" class="register-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>

<div class="form-group">
        <label for="adminSecret">Admin key</label>
        <input type="text" id="adminSecret" required />
      </div>
       

      <button type="submit">Register</button>
    </form>
  <div class="auth-row">
  <p>Already have an account?</p>
  <button id="showLoginBtn" type="button">Log in</button>
</div>

  </div>

</main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 EVENTERA. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/register.js"></script>
  </body>
</html>
